<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Chép Chính Tả HSK 2 - JinYin</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #fdf2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        .question-box { 
            font-size: 20px; 
            color: #d14d72; 
            margin-bottom: 20px; 
            font-weight: bold; 
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #a7d08c;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        .btn {
            background: #4a7c44;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover { background: #3d6638; }
        .result { margin-top: 20px; font-weight: bold; height: 24px; }
        .score-board { font-size: 18px; margin-bottom: 20px; color: #666; }
        .correct { color: #4a7c44; }
        .wrong { color: #d14d72; }
        .audio-btn {
            background: #ff8aaf;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="game-container" id="gameBox">
    <div class="score-board">Điểm: <span id="currentScore">0</span></div>
    
    <div id="quizArea">
        <div class="question-box">
            <span id="vietnameseQuestion">Đang tải...</span>
            <button class="audio-btn" onclick="speakChinese()">🔊</button>
        </div>
        
        <input type="text" id="hanziInput" placeholder="Nghe và gõ Hán tự..." autocomplete="off">
        <br>
        <button class="btn" onclick="checkAnswer()">Kiểm tra</button>
        <div class="result" id="resultMsg"></div>
    </div>
</div>

<script>
    const quizData = [
        { vi: "Mình sẽ đi Bắc Kinh để du lịch, theo bạn thì đi vào khi nào là tốt nhất?", zh: "我要去北京旅游，你觉得什么时候去最好" },
        { vi: "Nếu đi Bắc Kinh để du lịch thì tốt nhất là đi vào tháng chín", zh: "九月去北京旅游最好" },
        { vi: "Tại sao?", zh: "为什么" },
        { vi: "Vì vào tháng chín, thời tiết ở Bắc Kinh không lạnh cũng không nóng.", zh: "九月的北京天气不冷也不热" } 
    ];

    let currentIdx = 0;
    let score = 0;

    // Hàm phát âm tiếng Trung
    function speakChinese() {
        const text = quizData[currentIdx].zh;
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'zh-CN'; 
        msg.rate = 0.8; 
        window.speechSynthesis.speak(msg);
    }

    function loadQuestion() {
        if (currentIdx < quizData.length) {
            document.getElementById('vietnameseQuestion').innerText = quizData[currentIdx].vi;
            document.getElementById('hanziInput').value = "";
            document.getElementById('resultMsg').innerText = "";
            document.getElementById('hanziInput').focus();
            
            // Tự động đọc câu sau 0.5s để người học nghe
            setTimeout(speakChinese, 500);
        } else {
            showFinalResult();
        }
    }

    function checkAnswer() {
        const userInput = document.getElementById('hanziInput').value.trim();
        const correctAnswer = quizData[currentIdx].zh;
        const resultMsg = document.getElementById('resultMsg');

        // Logic so sánh: loại bỏ dấu câu cơ bản để tránh lỗi nếu người dùng không gõ dấu câu
        const cleanUser = userInput.replace(/[。？！，,.?!]/g, "");
        const cleanCorrect = correctAnswer.replace(/[。？！，,.?!]/g, "");

        if (cleanUser === cleanCorrect) {
            score += 10;
            document.getElementById('currentScore').innerText = score;
            resultMsg.innerHTML = '<span class="correct">Chính xác! +10 điểm</span>';
            
            setTimeout(() => {
                currentIdx++;
                loadQuestion();
            }, 1000);
        } else {
            resultMsg.innerHTML = '<span class="wrong">Chưa đúng, nghe lại và thử nhé!</span>';
        }
    }

    function showFinalResult() {
        document.getElementById('quizArea').innerHTML = `
            <h2 class="correct">Hoàn thành!</h2>
            <p style="font-size: 20px;">Tổng điểm của bạn là: <strong>${score}</strong></p>
            <button class="btn" onclick="location.reload()">Chơi lại</button>
            <br><br>
            <a href="hsk2_bai1.html" style="color: #d14d72; text-decoration: none; font-weight: bold;">← Quay lại chọn bài</a>
        `;
    }

    // Khởi tạo câu hỏi đầu tiên
    loadQuestion();

    document.getElementById('hanziInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });
</script>

</body>
</html>
