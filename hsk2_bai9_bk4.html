<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Chép Chính Tả HSK 2 - JinYin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }
        .question-box { 
            font-size: 20px; 
            color: #d14d72; 
            margin-bottom: 20px; 
            font-weight: bold; 
            line-height: 1.5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #a7d08c;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        .btn {
            background: #4a7c44;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .btn:hover { background: #3d6638; }
        .result { margin-top: 20px; font-weight: bold; min-height: 24px; }
        .score-board { font-size: 18px; margin-bottom: 20px; color: #666; }
        .correct { color: #4a7c44; }
        .wrong { color: #d14d72; }
        .audio-btn {
            background: #ff8aaf;
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        /* Màn hình bắt đầu để kích hoạt âm thanh */
        #startScreen {
            display: block;
        }
        #quizArea {
            display: none;
        }
    </style>
</head>
<body>

<div class="game-container" id="gameBox">
    <div id="startScreen">
        <h2 style="color: #d14d72;">JinYin chào bạn! Sẵn sàng chưa?</h2>
        <p>Nhấn nút bên dưới để bắt đầu nghe và viết nhé.</p>
        <button class="btn" onclick="startGame()">Bắt đầu học</button>
    </div>

    <div id="quizArea">
        <div class="score-board">Điểm: <span id="currentScore">0</span></div>
        <div class="question-box">
            <span id="vietnameseQuestion">Đang tải...</span>
            <button class="audio-btn" onclick="speakChinese()">🔊</button>
        </div>
        
        <input type="text" id="hanziInput" placeholder="Nghe và gõ Hán tự..." autocomplete="off">
        <br>
        <button class="btn" onclick="checkAnswer()">Kiểm tra</button>
        <div class="result" id="resultMsg"></div>
    </div>
</div>

<script>
  const quizData = [
    { vi: "Bài kiểm tra hôm qua thế nào rồi? Bạn có hiểu hết những gì đã nghe không?", zh: "昨天的考试怎么样？你都听懂了吗？" },
    { vi: "Mình hiểu hết chứ.", zh: "听懂了。" },
    { vi: "Vậy bạn có làm hết không?", zh: "你都做完了没有？" },
    { vi: "Câu hỏi quá nhiều nên mình không làm hết.", zh: "题太多，我没做完。" }
];

    let currentIdx = 0;
    let score = 0;

    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('quizArea').style.display = 'block';
        loadQuestion();
    }

    function speakChinese() {
        // Hủy các câu đang đọc dở để tránh chồng chéo
        window.speechSynthesis.cancel();
        
        const text = quizData[currentIdx].zh;
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.lang = 'zh-CN'; 
        msg.rate = 0.8; 
        window.speechSynthesis.speak(msg);
    }

    function loadQuestion() {
        if (currentIdx < quizData.length) {
            document.getElementById('vietnameseQuestion').innerText = quizData[currentIdx].vi;
            document.getElementById('hanziInput').value = "";
            document.getElementById('resultMsg').innerText = "";
            document.getElementById('hanziInput').focus();
            
            // Đọc câu hỏi
            setTimeout(speakChinese, 300);
        } else {
            showFinalResult();
        }
    }

    function checkAnswer() {
        const userInput = document.getElementById('hanziInput').value.trim();
        const correctAnswer = quizData[currentIdx].zh;
        const resultMsg = document.getElementById('resultMsg');

        // Làm sạch chuỗi: xóa khoảng trắng và các dấu câu phổ biến trong tiếng Trung/Anh
        const cleanUser = userInput.replace(/[。？！，,.?! ]/g, "");
        const cleanCorrect = correctAnswer.replace(/[。？！，,.?! ]/g, "");

        if (cleanUser === cleanCorrect) {
            score += 10;
            document.getElementById('currentScore').innerText = score;
            resultMsg.innerHTML = '<span class="correct">Chính xác! +10 điểm</span>';
            
            setTimeout(() => {
                currentIdx++;
                loadQuestion();
            }, 1000);
        } else {
            resultMsg.innerHTML = '<span class="wrong">Chưa đúng, nghe lại và thử nhé!</span>';
            speakChinese(); // Đọc lại câu nếu sai để người học nghe lại
        }
    }

    function showFinalResult() {
        document.getElementById('quizArea').innerHTML = `
            <h2 class="correct">Hoàn thành xuất sắc!</h2>
            <p style="font-size: 20px;">Tổng điểm của bạn là: <strong>${score}</strong></p>
            <button class="btn" onclick="location.reload()">Chơi lại</button>
            <br><br>
            <a href="hsk2_bai9.html" style="color: #d14d72; text-decoration: none; font-weight: bold;">← Quay lại chọn bài</a>
        `;
    }

    document.getElementById('hanziInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });
</script>

</body>
</html>
